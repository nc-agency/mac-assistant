<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
AppIcon.svg - Hauptsymbol für Mac-Assistenten
Erstellt am: 2025-05-04
Änderungen:
- Initiales App-Icon für Mac-Assistenten
- Modernes Design mit Verlaufseffekt und AI-Symbolik
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Hintergrundkreis mit Verlauf -->
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4158D0"/>
            <stop offset="46%" stop-color="#C850C0"/>
            <stop offset="100%" stop-color="#FFCC70"/>
        </linearGradient>
        
        <!-- Lichteffekt -->
        <radialGradient id="lightEffect" cx="30%" cy="30%" r="70%" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        
        <!-- Schatten für 3D-Effekt -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
            <feOffset dx="0" dy="10" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge> 
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/> 
            </feMerge>
        </filter>
    </defs>
    
    <!-- Hintergrundkreis -->
    <circle cx="512" cy="512" r="460" fill="url(#backgroundGradient)" filter="url(#dropShadow)"/>
    
    <!-- Lichteffekt -->
    <circle cx="512" cy="512" r="450" fill="url(#lightEffect)"/>
    
    <!-- AI-Symbol: Kreis mit Verbindungen und Knoten -->
    <g fill="white" stroke="white" stroke-width="8">
        <!-- Zentraler Kreis -->
        <circle cx="512" cy="512" r="120" fill="rgba(255,255,255,0.9)" stroke="none"/>
        
        <!-- Umgebende Kreise/Knoten -->
        <circle cx="512" cy="280" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        <circle cx="700" cy="400" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        <circle cx="700" cy="624" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        <circle cx="512" cy="744" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        <circle cx="324" cy="624" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        <circle cx="324" cy="400" r="45" fill="rgba(255,255,255,0.8)" stroke="none"/>
        
        <!-- Verbindungslinien -->
        <line x1="512" y1="392" x2="512" y2="280" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
        <line x1="609" y1="450" x2="700" y2="400" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
        <line x1="609" y1="574" x2="700" y2="624" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
        <line x1="512" y1="632" x2="512" y2="744" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
        <line x1="415" y1="574" x2="324" y2="624" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
        <line x1="415" y1="450" x2="324" y2="400" stroke="rgba(255,255,255,0.6)" stroke-width="10"/>
    </g>
    
    <!-- "M" Symbol im Zentrum -->
    <text x="512" y="542" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="bold" fill="#4158D0" text-anchor="middle">M</text>
    
    <!-- Äußerer Ring -->
    <circle cx="512" cy="512" r="460" fill="none" stroke="white" stroke-width="5" stroke-opacity="0.3"/>
</svg>